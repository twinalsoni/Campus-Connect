      <li onclick="openSection('events')" class="cursor-pointer hover:underline">Events</li>
      <li onclick="openSection('buildings')" class="cursor-pointer hover:underline">Buildings</li>
      <li onclick="openSection('schedule')" class="cursor-pointer hover:underline">Schedule</li>

      <div onclick="openSection('schedule')" class="card">📊 Schedule</div>

    <!-- Section -->

      <h2 id="sectionTitle" class="text-2xl font-bold mb-4"></h2>
      <div id="formArea" class="flex gap-3 flex-wrap mb-4"></div>
      <div id="tableContainer" class="overflow-x-auto">
        <!-- Users table placeholder -->
        <table id="userTable" class="w-full bg-white"></table>
      </div>
      <button onclick="back()" class="mt-4 text-blue-600">← Back</button>

  <style>
    .card{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
      cursor:pointer;
      transition:0.3s;
      text-align:center;
      font-weight:bold;
    }
    .card:hover{
      transform:translateY(-5px);
      background:#eef2ff;
    }
    .slot{

      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      background:#f8fafc;
    }
    .slot:hover{ background:#e0e7ff; }
    .subject{
      background:#6366f1;
      color:white;
      padding:4px 6px;
      border-radius:6px;
      cursor:grab;
      font-size:12px;
    }

min-height:40px;
padding:4px;
}

.subject{
background:#6366f1;
color:white;
padding:4px 6px;

font-size:12px;
text-align:center;

    console.log("Dashboard UNI ID:", uni_id);
    if(!uni_id){
      alert("University ID missing. Login again");
      window.location.href="register.html";
    }
    // ================= SECTION SWITCH =================
    function openSection(type){
      dashboardCards.style.display="none";
      sectionPage.classList.remove("hidden");
      sectionTitle.innerText = type.toUpperCase();
      formArea.innerHTML = "";
      tableContainer.innerHTML = `<table id="userTable" class="w-full bg-white"></table>`;

        renderTimetableUI();
        setTimeout(loadTimetable,200);
      }

      if(type==="faculty_timetable"){ 
        renderFacultyTimetableUI();
        setTimeout(loadFacultyTimetable,200);
      }

          <input id="date" placeholder="Date">
          <input id="desc" placeholder="Description">
          <button onclick="addEvent()">Add</button>

          <input id="name" placeholder="Building">

          <input id="title" placeholder="Title">
          <input id="date" placeholder="Date">
          <button onclick="addSchedule()">Add</button>
        `;
        loadSchedule();

      if(type==="users"){
        formArea.innerHTML = `
        <button onclick="showStudentForm()" class="bg-blue-500 text-white px-3 py-2 rounded">
          Add Student
        </button>

<button onclick="showFacultyForm()" class="bg-green-500 text-white px-3 py-2 rounded">
Add Faculty
</button>

<div id="userForm" class="mt-4 w-full"></div>

`;

loadUsers();

function back(){

// 1. Function to fetch and display saved data
async function loadFacultyTimetable() {
    const sem = document.getElementById("facultySem").value;
    const uni_id = localStorage.getItem("uni_id");

    if (!sem || !uni_id) return;

    // Fetch the saved data
    const res = await fetch(`http://127.0.0.1:8000/get_faculty_timetable_admin?sem=${sem}&uni_id=${uni_id}`);
    const data = await res.json();

    // Clear all existing slots first
    document.querySelectorAll('.slot').forEach(slot => slot.innerHTML = "");

    // Fill slots with saved data
    data.forEach(item => {
        // Find the specific slot using the data attributes
        const selector = `.slot[data-day="${item.day}"][data-slot="${item.slot}"][data-part="${item.part}"]`;
        const slotEl = document.querySelector(selector);

        if (slotEl) {
            slotEl.innerHTML = `
                <div class="bg-blue-100 p-1 rounded text-xs border border-blue-300">
                    <div class="font-bold">${item.subject}</div>
                    <div class="text-gray-600">${item.faculty}</div>
                </div>`;
        }
    });
}

async function loadSavedFacultyTimetable() {
    const sem = document.getElementById("facultySem").value;
    const uni_id = localStorage.getItem("uni_id");
    
    const res = await fetch(`http://127.0.0.1:8000/get_faculty_timetable_admin?sem=${sem}&uni_id=${uni_id}`);
    const data = await res.json();

    // Loop through the data and put it back into the slots
    data.forEach(item => {
        const slot = document.querySelector(`.slot[data-day="${item.day}"][data-slot="${item.slot}"][data-part="${item.part}"]`);
        if(slot) {
            slot.innerHTML = `<div class="subject-box">${item.subject} <br> <small>${item.faculty}</small></div>`;
        }
    });
}
    // ================= EVENTS =================
    async function addEvent(){
      const title = document.getElementById("title").value;
      const date = document.getElementById("date").value;
      const desc = document.getElementById("desc").value;
      await fetch("http://127.0.0.1:8000/add_event",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({title,date,description:desc})
      });
      loadEvents();
    }

    async function loadEvents(){
      let res = await fetch("http://127.0.0.1:8000/get_events");
      let data = await res.json();
      let html = `<table class="w-full bg-white">
        <tr><th>Title</th><th>Date</th></tr>`;
      data.forEach(d=>{
        html += `<tr><td>${d[1]}</td><td>${d[2]}</td></tr>`;
      });
      html += `</table>`;
      tableContainer.innerHTML = html;
    }

    async function loadTimetable(){

let dept = document.getElementById("dept").value;
let sem = document.getElementById("sem").value;

let res = await fetch(
`http://127.0.0.1:8000/get_timetable/${dept}/${sem}`
);

let data = await res.json();

document.querySelectorAll(".slot").forEach(s=>{ 
s.innerHTML=""; 
});

data.forEach(d=>{

let subject = d[0];
let day = d[1];
let slot = d[2];
let part = d[3];

let cell = document.querySelector(
`[data-day="${day}"][data-slot="${slot}"][data-part="${part}"]`
);

if(cell){
cell.innerHTML = `<div class="subject">${subject}</div>`;
}

});

}

async function loadUsers() {

tableContainer.innerHTML =
"<p class='text-red-500'>University ID missing. Login again.</p>";

async function verifyStudent(){

const email = document.getElementById("email").value;

method:"POST",

headers:{

},

}else{

async function addStudent(){

const name = document.getElementById("sname").value;
const email = document.getElementById("semail").value;
const dept = document.getElementById("sdept").value;
const sem = document.getElementById("ssem").value;
const uni_id = localStorage.getItem("uni_id");

await fetch("http://127.0.0.1:8000/add_student",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
name,
email,
department:dept,
semester:sem,
university_id:uni_id
})

});

loadUsers();

}
