<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Connect | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; }
        .bg-signature { background: linear-gradient(135deg, #14B8A6 0%, #6366F1 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="max-w-4xl w-full text-center">
        <div class="w-20 h-20 bg-signature rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/graduation-cap.png" class="w-12" />
        </div>
        <h1 class="text-6xl font-black text-slate-900 mb-12 tracking-tighter">Campus Connect</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <a href="register.html" class="p-10 bg-white border-2 border-transparent hover:border-teal-500 rounded-[40px] shadow-sm transition-all block">
                <img src="https://img.icons8.com/ios-filled/50/14B8A6/office.png" class="w-12 mx-auto mb-4"/>
                <h3 class="text-2xl font-black text-slate-800">University Onboarding</h3>
                <p class="text-slate-400 mt-2">Register your institution</p>
            </a>
            <a href="login.html" class="p-10 bg-white border-2 border-transparent hover:border-indigo-500 rounded-[40px] shadow-sm transition-all block">
                <img src="https://img.icons8.com/ios-filled/50/6366F1/graduation-cap.png" class="w-12 mx-auto mb-4"/>
                <h3 class="text-2xl font-black text-slate-800">Portal Login</h3>
                <p class="text-slate-400 mt-2">Student & Faculty access</p>
            </a>
        </div>
    </div>
</body>
</html>
